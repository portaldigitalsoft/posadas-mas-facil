<!DOCTYPE html>
<html lang="es" translate="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Posadas Más Fácil</title>
    
    <link rel="stylesheet" href="index.css">
    <script type="module" src="script.js"></script>

    <script type="text/javascript">
      // Script Ripley Nivel 3: Forzamos al navegador a ignorar la subcarpeta
      (function() {
        var l = window.location;
        if (l.pathname.split('/').filter(Boolean).length > 1) {
          // Si el router se confunde con la ruta, lo reseteamos al inicio del proyecto
          window.history.replaceState(null, null, '/posadas-mas-facil/');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
