<!DOCTYPE html>
<html lang="es" translate="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Posadas Más Fácil</title>
    
    <base href="/posadas-mas-facil/">

    <link rel="stylesheet" href="index.css">
    <script type="module" src="script.js"></script>

    <script type="text/javascript">
      // Este script guarda la ruta actual y limpia el camino para el Router de React
      (function(l) {
        if (l.pathname === '/posadas-mas-facil' || l.pathname === '/posadas-mas-facil/') {
          // Si estamos en la raíz del proyecto, le aseguramos al JS que esta es la ruta base
          window.history.replaceState(null, null, '/posadas-mas-facil/');
        }
      }(window.location));
    </script>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
